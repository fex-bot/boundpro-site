<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 36" role="img" aria-label="BoundPro">
  <title>BoundPro</title>
  <!-- Mark: stylized bound book / ledger -->
  <g transform="translate(0,4)">
    <!-- back cover -->
    <rect x="2" y="2" width="24" height="26" rx="3" fill="#0a1628"/>
    <!-- front cover offset -->
    <rect x="6" y="0" width="24" height="26" rx="3" fill="#0f1d33"/>
    <!-- spine accent -->
    <rect x="6" y="0" width="3" height="26" fill="#d97706"/>
    <!-- ledger lines -->
    <rect x="13" y="6" width="13" height="1.5" rx="0.75" fill="#cbd5e1"/>
    <rect x="13" y="11" width="11" height="1.5" rx="0.75" fill="#cbd5e1"/>
    <rect x="13" y="16" width="13" height="1.5" rx="0.75" fill="#cbd5e1"/>
    <rect x="13" y="21" width="9" height="1.5" rx="0.75" fill="#cbd5e1"/>
  </g>
  <!-- Wordmark -->
  <text x="42" y="26"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="22"
        letter-spacing="-0.01em"
        fill="#0a1628"
        font-weight="600">Bound<tspan font-weight="800" fill="#0a1628">Pro</tspan></text>
</svg>
