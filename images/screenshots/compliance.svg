        <text x="62" y="48" fill="#94a3b8" font-size="10.5">Border-state long-gun sale</text>

        <text x="20" y="82" fill="#475569" font-size="11.5" line-height="1.5">2 long guns to a single non-resident in AZ within 5 days. Border-state report required.</text>
        <text x="20" y="100" fill="#475569" font-size="11.5"></text>

        <line x1="20" y1="116" x2="276" y2="116" stroke="#f1f5f9"/>

        <text x="20" y="138" fill="#94a3b8" font-size="11">Window ends in <tspan fill="#0f172a" font-weight="600" font-family="JetBrains Mono, monospace">2 days</tspan></text>
        <text x="276" y="138" text-anchor="end" fill="#0f172a" font-size="11.5" font-weight="600">Review ’</text>
