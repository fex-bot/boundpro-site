        <text x="20" y="78" fill="#475569" font-size="11.5">FFL <tspan fill="#0f172a" font-weight="600" font-family="JetBrains Mono, monospace">5-12-345-67-8X-90123</tspan></text>
        <text x="20" y="98" fill="#475569" font-size="11.5">expires <tspan fill="#0f172a" font-weight="600" font-family="JetBrains Mono, monospace">04/22/2026</tspan> (47 days)</text>

        <line x1="20" y1="116" x2="276" y2="116" stroke="#f1f5f9"/>
        <text x="20" y="138" fill="#94a3b8" font-size="11">FFL Type <tspan fill="#0f172a" font-weight="600">07</tspan></text>
        <text x="276" y="138" text-anchor="end" fill="#0f172a" font-size="11.5" font-weight="600">Renew ’</text>
