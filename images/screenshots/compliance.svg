        <text x="62" y="32" fill="#0f172a" font-size="13" font-weight="600">NICS delay  proceed deadline</text>
        <text x="62" y="48" fill="#94a3b8" font-size="10.5">D. Hartley · 4473 #BPSE-00421</text>

        <g transform="translate(20,72)">
