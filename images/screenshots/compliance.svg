        <text x="780" y="22" fill="#94a3b8" font-family="JetBrains Mono, monospace">a4b2&#8230;f071</text>
      </g>
      <line x1="0" y1="138" x2="912" y2="138" stroke="#f1f5f9"/>

      <!-- Row 2 -->
      <g transform="translate(0,138)" font-size="11.5">
        <text x="20" y="22" fill="#475569" font-family="JetBrains Mono, monospace">03/04 13:58:41</text>
        <text x="160" y="22" fill="#0f172a">System</text>
        <g transform="translate(296,8)">
          <rect width="56" height="20" rx="5" fill="#ecfdf5"/>
          <text x="28" y="14" text-anchor="middle" fill="#047857" font-size="10.5" font-weight="600">DETECT</text>
        </g>
