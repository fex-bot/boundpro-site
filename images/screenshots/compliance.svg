      <rect width="200" height="34" rx="8" fill="#ffffff" fill-opacity="0.09"/>
      <rect width="3" height="34" rx="1.5" fill="#d97706"/>
      <path d="M28 14 l8 3 v7 c0 5 -4 8 -8 9 -4 -1 -8 -4 -8 -9 v-7 z M25 22 l3 3 5 -6" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
