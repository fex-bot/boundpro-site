        <line x1="20" y1="116" x2="276" y2="116" stroke="#f1f5f9"/>
        <text x="20" y="138" fill="#94a3b8" font-size="11">Submitted <tspan fill="#0f172a" font-weight="600">Mar 02</tspan></text>
        <text x="276" y="138" text-anchor="end" fill="#0f172a" font-size="11.5" font-weight="600">Open form ’</text>
      </g>

