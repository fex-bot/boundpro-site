          <text x="28" y="14" text-anchor="middle" fill="#1e40af" font-size="10.5" font-weight="600">CREATE</text>
        </g>
        <text x="500" y="22" fill="#0f172a">Form 4473 #BPSE-00424 started</text>
        <text x="780" y="22" fill="#94a3b8" font-family="JetBrains Mono, monospace">3b08&#8230;91a4</text>
      </g>
      <line x1="0" y1="222" x2="912" y2="222" stroke="#f1f5f9"/>

      <!-- Row 4 -->
      <g transform="translate(0,222)" font-size="11.5">
        <text x="20" y="22" fill="#475569" font-family="JetBrains Mono, monospace">03/04 11:15:02</text>
        <text x="160" y="22" fill="#0f172a">Sarah Lin</text>
        <g transform="translate(296,8)">
          <rect width="56" height="20" rx="5" fill="#dbeafe"/>
          <text x="28" y="14" text-anchor="middle" fill="#1e40af" font-size="10.5" font-weight="600">CREATE</text>
