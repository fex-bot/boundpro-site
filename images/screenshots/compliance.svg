<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="BoundPro compliance center showing ATF Form 3310.4 alert, FFL expiry warning, NICS delay countdown, and audit log" fill="none" font-family="Inter, system-ui, sans-serif">
  <title>BoundPro compliance center</title>
  <defs>
    <filter id="cardShadow5" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.06"/>
