<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="BoundPro reports and analytics with acquisition trends, NICS results donut, firearm type breakdown" fill="none" font-family="Inter, system-ui, sans-serif">
  <title>BoundPro reports and analytics</title>
  <defs>
    <filter id="cardShadow4" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="acqArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dispArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="#f8fafc"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="216" height="800" fill="#0f1d33"/>
  <g transform="translate(20,20)">
    <rect width="22" height="24" rx="3" fill="#18283f"/>
    <rect width="3" height="24" fill="#d97706"/>
    <rect x="7" y="6" width="11" height="1.4" rx="0.7" fill="#94a3b8"/>
    <rect x="7" y="10" width="8" height="1.4" rx="0.7" fill="#94a3b8"/>
    <rect x="7" y="14" width="11" height="1.4" rx="0.7" fill="#94a3b8"/>
    <text x="32" y="18" fill="#ffffff" font-size="15" font-weight="700">BoundPro</text>
  </g>
  <g transform="translate(16,64)">
    <rect width="184" height="44" rx="8" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="10" y="10" width="24" height="24" rx="6" fill="#d97706"/>
    <text x="22" y="26" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">RA</text>
    <text x="40" y="20" fill="#ffffff" font-size="12" font-weight="600">Ridgeline Arms</text>
    <text x="40" y="34" fill="#94a3b8" font-size="10">3 FFLs · SOT Class III</text>
  </g>
  <text x="24" y="132" fill="#64748b" font-size="10" font-weight="700" letter-spacing="0.08em">WORKSPACE</text>
  <g font-size="13">
    <g transform="translate(8,148)">
      <path d="M22 22 l8 -7 8 7 v8 a1 1 0 0 1 -1 1 h-14 a1 1 0 0 1 -1 -1 z" stroke="#94a3b8" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="46" y="22" fill="#cbd5e1">Dashboard</text>
    </g>
    <g transform="translate(8,186)">
      <path d="M22 16 h12 a1 1 0 0 1 1 1 v12 a1 1 0 0 1 -1 1 h-12 a1 1 0 0 1 -1 -1 v-12 a1 1 0 0 1 1 -1 z M25 20 h7 M25 23 h7 M25 26 h5" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
      <text x="46" y="22" fill="#cbd5e1">A&amp;D Ledger</text>
    </g>
    <g transform="translate(8,220)">
      <path d="M22 16 h10 l3 3 v11 a1 1 0 0 1 -1 1 h-12 a1 1 0 0 1 -1 -1 v-13 a1 1 0 0 1 1 -1 z M25 22 h7 M25 25 h7 M25 28 h5" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
      <text x="46" y="22" fill="#cbd5e1">Form 4473s</text>
    </g>
    <g transform="translate(8,254)">
      <path d="M22 19 h13 m-3 -3 l3 3 -3 3 M35 27 h-13 m3 -3 l-3 3 3 3" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
      <text x="46" y="22" fill="#cbd5e1">Transfers</text>
    </g>
    <g transform="translate(8,288)">
      <path d="M28 14 l8 4 v6 c0 4 -3 7 -8 8 -5 -1 -8 -4 -8 -8 v-6 z" stroke="#94a3b8" stroke-width="1.4" stroke-linejoin="round"/>
      <text x="46" y="22" fill="#cbd5e1">NFA Registry</text>
    </g>
    <g transform="translate(8,322)">
      <path d="M22 22 a6 6 0 1 0 12 0 a6 6 0 1 0 -12 0 M28 18 v8 M25 21 h6" stroke="#94a3b8" stroke-width="1.4"/>
      <text x="46" y="22" fill="#cbd5e1">Pawn</text>
    </g>
    <g transform="translate(8,356)">
      <path d="M28 14 l8 3 v7 c0 5 -4 8 -8 9 -4 -1 -8 -4 -8 -9 v-7 z M25 22 l3 3 5 -6" stroke="#94a3b8" stroke-width="1.4" stroke-linejoin="round"/>
      <text x="46" y="22" fill="#cbd5e1">Compliance</text>
    </g>
    <!-- Reports ACTIVE -->
    <g transform="translate(8,390)">
      <rect width="200" height="34" rx="8" fill="#ffffff" fill-opacity="0.09"/>
      <rect width="3" height="34" rx="1.5" fill="#d97706"/>
      <path d="M22 28 v-6 M27 28 v-10 M32 28 v-7 M37 28 v-12" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
      <text x="46" y="22" fill="#ffffff" font-weight="600">Reports</text>
    </g>
    <g transform="translate(8,424)">
      <path d="M22 18 h14 M22 22 h14 M22 26 h10" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
      <text x="46" y="22" fill="#cbd5e1">Audit Log</text>
    </g>
