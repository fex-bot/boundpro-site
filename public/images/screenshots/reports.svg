    <path d="M14 18 h6 M14 14 v8 m-2 -4 h2" stroke="#475569" stroke-width="1.4"/>
    <text x="34" y="20" fill="#0f172a" font-size="12" font-weight="500">YTD 2026</text>
    <path d="M104 18 l4 4 4 -4" stroke="#475569" stroke-width="1.4" fill="none"/>
  </g>
