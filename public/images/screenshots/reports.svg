        <circle cx="6" cy="6" r="5" fill="#0a1628"/>
        <text x="18" y="10" fill="#475569">Proceed · 401</text>
        <circle cx="138" cy="6" r="5" fill="#d97706"/>
        <text x="150" y="10" fill="#475569">Delayed · 19</text>
      </g>
      <g transform="translate(20,272)" font-size="11.5">
        <circle cx="6" cy="6" r="5" fill="#e11d48"/>
        <text x="18" y="10" fill="#475569">Denied · 3</text>
      </g>
    </g>

    <!-- BOTTOM: Firearm types bar chart -->
    <g transform="translate(0,494)">
      <rect width="912" height="186" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#cardShadow4)"/>
      <text x="20" y="30" fill="#0f172a" font-size="14" font-weight="600">Inventory by firearm type</text>
      <text x="20" y="48" fill="#64748b" font-size="11.5">Total in stock · acquisitions in trailing 12 months</text>

      <line x1="0" y1="64" x2="912" y2="64" stroke="#f1f5f9"/>

      <!-- Bars -->
      <g transform="translate(20,82)">
        <!-- Bar group: pistol -->
        <g>
          <text x="0" y="14" fill="#475569" font-size="11.5" font-weight="500">Pistol</text>
          <rect x="80" y="2" width="450" height="16" rx="4" fill="#fef3c7"/>
          <rect x="80" y="2" width="378" height="16" rx="4" fill="#d97706"/>
          <text x="538" y="14" fill="#0f172a" font-size="11.5" font-weight="600" font-family="JetBrains Mono, monospace">472</text>
          <text x="582" y="14" fill="#94a3b8" font-size="11">37.9%</text>
        </g>

        <!-- Rifle -->
        <g transform="translate(0,28)">
          <text x="0" y="14" fill="#475569" font-size="11.5" font-weight="500">Rifle</text>
          <rect x="80" y="2" width="450" height="16" rx="4" fill="#fef3c7"/>
          <rect x="80" y="2" width="296" height="16" rx="4" fill="#d97706"/>
          <text x="538" y="14" fill="#0f172a" font-size="11.5" font-weight="600" font-family="JetBrains Mono, monospace">370</text>
          <text x="582" y="14" fill="#94a3b8" font-size="11">29.7%</text>
        </g>

        <!-- Shotgun -->
        <g transform="translate(0,56)">
          <text x="0" y="14" fill="#475569" font-size="11.5" font-weight="500">Shotgun</text>
          <rect x="80" y="2" width="450" height="16" rx="4" fill="#fef3c7"/>
          <rect x="80" y="2" width="186" height="16" rx="4" fill="#d97706"/>
          <text x="538" y="14" fill="#0f172a" font-size="11.5" font-weight="600" font-family="JetBrains Mono, monospace">232</text>
          <text x="582" y="14" fill="#94a3b8" font-size="11">18.6%</text>
        </g>

        <!-- Receiver -->
        <g transform="translate(0,84)">
          <text x="0" y="14" fill="#475569" font-size="11.5" font-weight="500">Receiver</text>
          <rect x="80" y="2" width="450" height="16" rx="4" fill="#fef3c7"/>
          <rect x="80" y="2" width="100" height="16" rx="4" fill="#d97706"/>
          <text x="538" y="14" fill="#0f172a" font-size="11.5" font-weight="600" font-family="JetBrains Mono, monospace">124</text>
          <text x="582" y="14" fill="#94a3b8" font-size="11">9.9%</text>
        </g>
      </g>

      <!-- Right side: NFA / type breakdown -->
      <g transform="translate(640,80)">
        <text x="0" y="14" fill="#475569" font-size="11.5" font-weight="500">NFA items (in stock)</text>
        <line x1="0" y1="22" x2="252" y2="22" stroke="#e2e8f0"/>
        <g transform="translate(0,38)" font-size="11.5">
          <text x="0" y="0" fill="#0f172a">Suppressors</text>
          <text x="252" y="0" text-anchor="end" fill="#0f172a" font-weight="600" font-family="JetBrains Mono, monospace">28</text>
        </g>
        <g transform="translate(0,58)" font-size="11.5">
          <text x="0" y="0" fill="#0f172a">SBRs</text>
          <text x="252" y="0" text-anchor="end" fill="#0f172a" font-weight="600" font-family="JetBrains Mono, monospace">14</text>
        </g>
        <g transform="translate(0,78)" font-size="11.5">
          <text x="0" y="0" fill="#0f172a">Machine guns</text>
          <text x="252" y="0" text-anchor="end" fill="#0f172a" font-weight="600" font-family="JetBrains Mono, monospace">7</text>
        </g>
      </g>
