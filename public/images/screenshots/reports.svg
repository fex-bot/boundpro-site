      <text x="20" y="32" fill="#0f172a" font-size="14" font-weight="600">NICS results</text>
      <text x="20" y="50" fill="#64748b" font-size="11.5">423 forms YTD</text>
      <line x1="0" y1="68" x2="300" y2="68" stroke="#f1f5f9"/>

      <!-- Donut chart at center -->
      <g transform="translate(150,166)">
        <!-- Background ring -->
        <circle r="64" fill="none" stroke="#f1f5f9" stroke-width="22"/>
        <!-- Segments  proceed 94.8%, delayed 4.5%, denied 0.7% -->
        <!-- Proceed (#0a1628) ~94.8% = 0.948 * 360 -->
        <circle r="64" fill="none" stroke="#0a1628" stroke-width="22"
                stroke-dasharray="381.3 21.7" stroke-dashoffset="100.5" transform="rotate(-90)"/>
        <!-- Delayed (#d97706) ~4.5% -->
        <circle r="64" fill="none" stroke="#d97706" stroke-width="22"
                stroke-dasharray="18.1 384.9" stroke-dashoffset="-280.8" transform="rotate(-90)"/>
        <!-- Denied (#e11d48) ~0.7% -->
        <circle r="64" fill="none" stroke="#e11d48" stroke-width="22"
                stroke-dasharray="2.8 400.2" stroke-dashoffset="-298.9" transform="rotate(-90)"/>

        <!-- Center text -->
        <text y="-3" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700" font-family="JetBrains Mono, monospace">94.8%</text>
        <text y="14" text-anchor="middle" fill="#64748b" font-size="10.5">proceed rate</text>
      </g>

      <!-- Legend -->
