    <text x="0" y="44" fill="#64748b" font-size="13">Year-to-date trends across acquisitions, dispositions, and NICS results.</text>

    <!-- Stat cards row -->
    <g transform="translate(0,68)">
      <!-- Card 1 -->
      <g>
        <rect width="222" height="98" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#cardShadow4)"/>
        <text x="14" y="28" fill="#64748b" font-size="11.5" font-weight="500">Acquisitions YTD</text>
        <text x="14" y="64" fill="#0f172a" font-size="28" font-weight="700" letter-spacing="-0.02em" font-family="JetBrains Mono, monospace">487</text>
        <g transform="translate(122,46)">
          <rect width="60" height="22" rx="6" fill="#ecfdf5"/>
          <path d="M10 14 l3 -4 4 1 5 -5" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
          <text x="48" y="15.5" text-anchor="end" fill="#047857" font-size="10.5" font-weight="700">+22%</text>
        </g>
        <text x="14" y="84" fill="#94a3b8" font-size="10.5">vs prior year</text>
      </g>

      <!-- Card 2 -->
      <g transform="translate(230,0)">
        <rect width="222" height="98" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#cardShadow4)"/>
        <text x="14" y="28" fill="#64748b" font-size="11.5" font-weight="500">Dispositions YTD</text>
        <text x="14" y="64" fill="#0f172a" font-size="28" font-weight="700" letter-spacing="-0.02em" font-family="JetBrains Mono, monospace">412</text>
        <g transform="translate(122,46)">
          <rect width="60" height="22" rx="6" fill="#ecfdf5"/>
          <path d="M10 14 l3 -4 4 1 5 -5" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
          <text x="48" y="15.5" text-anchor="end" fill="#047857" font-size="10.5" font-weight="700">+15%</text>
        </g>
        <text x="14" y="84" fill="#94a3b8" font-size="10.5">vs prior year</text>
      </g>

      <!-- Card 3 -->
      <g transform="translate(460,0)">
        <rect width="222" height="98" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#cardShadow4)"/>
        <text x="14" y="28" fill="#64748b" font-size="11.5" font-weight="500">4473s completed</text>
        <text x="14" y="64" fill="#0f172a" font-size="28" font-weight="700" letter-spacing="-0.02em" font-family="JetBrains Mono, monospace">423</text>
        <g transform="translate(122,46)">
          <rect width="80" height="22" rx="6" fill="#fffbeb"/>
          <text x="40" y="15.5" text-anchor="middle" fill="#b45309" font-size="10.5" font-weight="700">avg 4.2 min</text>
        </g>
        <text x="14" y="84" fill="#94a3b8" font-size="10.5">vs paper avg 23 min</text>
      </g>

      <!-- Card 4 -->
      <g transform="translate(690,0)">
        <rect width="222" height="98" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#cardShadow4)"/>
        <text x="14" y="28" fill="#64748b" font-size="11.5" font-weight="500">NICS proceed rate</text>
        <text x="14" y="64" fill="#0f172a" font-size="28" font-weight="700" letter-spacing="-0.02em" font-family="JetBrains Mono, monospace">94.8%</text>
        <g transform="translate(108,46)">
          <rect width="100" height="22" rx="6" fill="#f1f5f9"/>
          <text x="50" y="15.5" text-anchor="middle" fill="#475569" font-size="10.5" font-weight="600">3 denied · 19 delayed</text>
        </g>
        <text x="14" y="84" fill="#94a3b8" font-size="10.5">across 423 forms</text>
      </g>
    </g>

    <!-- LEFT chart: Acquisitions vs Dispositions -->
    <g transform="translate(0,190)">
      <rect width="600" height="288" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#cardShadow4)"/>
      <text x="20" y="32" fill="#0f172a" font-size="14" font-weight="600">Acquisitions vs dispositions</text>
      <text x="20" y="50" fill="#64748b" font-size="11.5">12-month rolling · monthly totals</text>

      <!-- Legend -->
      <g transform="translate(420,24)" font-size="11.5">
        <circle cx="6" cy="8" r="5" fill="#d97706"/>
        <text x="18" y="12" fill="#475569">Acquisitions</text>
        <circle cx="98" cy="8" r="5" fill="#0a1628"/>
        <text x="110" y="12" fill="#475569">Dispositions</text>
      </g>

      <line x1="0" y1="68" x2="600" y2="68" stroke="#f1f5f9"/>

      <!-- Chart area -->
      <g transform="translate(48,84)">
        <!-- Y axis labels -->
        <g font-size="10" fill="#94a3b8" text-anchor="end" font-family="JetBrains Mono, monospace">
          <text x="-10" y="4">60</text>
          <text x="-10" y="44">45</text>
          <text x="-10" y="84">30</text>
          <text x="-10" y="124">15</text>
          <text x="-10" y="164">0</text>
        </g>
        <!-- Grid lines -->
        <line x1="0" y1="0" x2="528" y2="0" stroke="#f1f5f9"/>
        <line x1="0" y1="40" x2="528" y2="40" stroke="#f1f5f9"/>
        <line x1="0" y1="80" x2="528" y2="80" stroke="#f1f5f9"/>
        <line x1="0" y1="120" x2="528" y2="120" stroke="#f1f5f9"/>
        <line x1="0" y1="160" x2="528" y2="160" stroke="#e2e8f0"/>

        <!-- Acquisitions area -->
        <path d="M0 110 L48 96 L96 88 L144 70 L192 84 L240 60 L288 48 L336 64 L384 38 L432 52 L480 30 L528 24 L528 160 L0 160 Z" fill="url(#acqArea)"/>
        <path d="M0 110 L48 96 L96 88 L144 70 L192 84 L240 60 L288 48 L336 64 L384 38 L432 52 L480 30 L528 24" stroke="#d97706" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Dispositions area (slightly lower) -->
        <path d="M0 124 L48 116 L96 100 L144 88 L192 100 L240 78 L288 70 L336 80 L384 56 L432 70 L480 50 L528 44 L528 160 L0 160 Z" fill="url(#dispArea)"/>
        <path d="M0 124 L48 116 L96 100 L144 88 L192 100 L240 78 L288 70 L336 80 L384 56 L432 70 L480 50 L528 44" stroke="#0a1628" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Highlight last point -->
        <circle cx="528" cy="24" r="4" fill="#d97706"/>
        <circle cx="528" cy="24" r="8" fill="#d97706" fill-opacity="0.18"/>
        <circle cx="528" cy="44" r="4" fill="#0a1628"/>
        <circle cx="528" cy="44" r="8" fill="#0a1628" fill-opacity="0.12"/>

        <!-- X axis labels -->
