          <text x="0" y="180">Apr</text>
          <text x="48" y="180">May</text>
          <text x="96" y="180">Jun</text>
          <text x="144" y="180">Jul</text>
          <text x="192" y="180">Aug</text>
          <text x="240" y="180">Sep</text>
          <text x="288" y="180">Oct</text>
          <text x="336" y="180">Nov</text>
          <text x="384" y="180">Dec</text>
          <text x="432" y="180">Jan</text>
          <text x="480" y="180">Feb</text>
          <text x="528" y="180">Mar</text>
        </g>
      </g>
    </g>

    <!-- RIGHT TOP: NICS Donut -->
    <g transform="translate(612,190)">
