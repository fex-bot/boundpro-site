  <!-- Top bar -->
  <rect x="216" y="0" width="984" height="56" fill="#ffffff"/>
  <line x1="216" y1="56" x2="1200" y2="56" stroke="#e2e8f0"/>
  <text x="248" y="26" fill="#0f172a" font-size="14" font-weight="600">Reports</text>
  <text x="248" y="42" fill="#64748b" font-size="11.5">Analytics for all bound books · Jan 1, 2026  present</text>

  <g transform="translate(896,14)">
