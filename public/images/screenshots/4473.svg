      <text x="892" y="18" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">5</text>
      <text x="892" y="48" text-anchor="middle" fill="#94a3b8" font-size="11">NICS</text>
    </g>

    <!-- LEFT: Form details -->
    <g transform="translate(0,144)">
