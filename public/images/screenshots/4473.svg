      <circle cx="230" cy="14" r="12" fill="#d97706"/>
      <path d="M224 14 l4 4 8 -8" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <text x="230" y="48" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="600">Buyer info</text>

