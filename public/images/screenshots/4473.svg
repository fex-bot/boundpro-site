      <text x="650" y="18" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">4</text>
      <text x="650" y="48" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="600">Buyer signature</text>

      <!-- Step 5 -->
