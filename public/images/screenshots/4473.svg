      <path d="M14 14 l4 4 8 -8" transform="translate(0,0)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <text x="20" y="48" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="600">Firearm</text>

